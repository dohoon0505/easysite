  <style>
    /* keyframes used across components */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    /* density variant */
    html[data-density="compact"] .page { padding: var(--size-500); }
    html[data-density="compact"] .card-body { padding: var(--size-400) var(--size-500); }
    html[data-density="compact"] .card-header { padding: var(--size-400) var(--size-500); }
    html[data-density="compact"] .table td { padding: var(--size-300); }
    html[data-density="compact"] .table th { padding: var(--size-200) var(--size-300); }
    /* responsive */
    @media (max-width: 1100px) {
      .app { grid-template-columns: 72px 1fr; }
      .sidebar { padding: var(--size-400) var(--size-200); }
      .sidebar .brand-name, .sidebar .brand-sub, .sidebar .site-meta,
      .sidebar .nav-item span:not(.nav-count), .sidebar .nav-label,
      .sidebar .user-info, .sidebar .site-switcher .caret { display: none; }
      .sidebar .brand { justify-content: center; }
      .sidebar .nav-item { justify-content: center; padding: var(--size-300); }
      .sidebar .nav-group + .nav-group { border-top: 1px solid var(--sm-border-subtle); }
      .sidebar .site-switcher { justify-content: center; padding: var(--size-200); }
      .sidebar-footer { justify-content: center; padding: 0; }
      .sidebar-footer .icon-btn { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
